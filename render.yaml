services:
  - type: web
    name: vvechat-backend
    runtime: node
    plan: free
    region: oregon
    buildCommand: cd backend && npm install
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "10000"
      - key: NODE_VERSION
        value: "22"
